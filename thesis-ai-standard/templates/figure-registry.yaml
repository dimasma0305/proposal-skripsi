schema_version: "2.0"
language: "id-ID"
encoding: "utf-8"

rules:
  caption:
    figure: "Judul gambar di bawah gambar, contoh: Gambar 4.1 Arsitektur Sistem"
    table: "Judul tabel di atas tabel, contoh: Tabel 4.1 Skenario Pengujian"
    equation: "Persamaan satu baris, bernomor per bab, contoh: (3.1)"
  numbering:
    mode: "per bab (crossref: chapters: true)"
    figure_pattern: "Gambar {chapter}.{index}"
    table_pattern: "Tabel {chapter}.{index}"
    equation_pattern: "({chapter}.{index})"
    continuous_check_required: true
  source_policy:
    editable_source_required: ["architecture", "flowchart", "use_case", "er_diagram", "sequence"]
    screenshot_allowed: ["ui_screenshot", "experiment_screenshot", "test_report"]
    table_source_allowed: ["manual_summary", "database_schema", "test_case", "experiment_result"]
  validation:
    - "Gambar/tabel diinsert setelah disebut pertama kali di teks"
    - "Penomoran per bab berurutan"
    - "Istilah judul konsisten dengan teks"
    - "Setiap ekspor menyimpan sumber (mermaid di index.qmd / file gambar)"
    - "Tangkapan layar tanpa info pribadi / data kotor"

