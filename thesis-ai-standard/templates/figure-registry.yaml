equations:
  - id: "(2.6)"
    title: "Relative Sequence Index (RSI)"
    chapter: "2"
    expression_source: "RSI = 0.7*J + 0.3*S_seq (CheatReportController.cs:1207)"
    variables:
      - { symbol: "J", meaning: "Jaccard Similarity (himpunan)", unit: "none" }
      - { symbol: "S_seq", meaning: "skor LCS ternormalisasi (urutan)", unit: "none" }
    first_mentioned_in: "BAB II 2.2.6 (#eq-rsi)"
    status: "inserted"
    risk_notes: "Sudah diselaraskan: rata-rata berbobot, bukan harmonik"
  - id: "(2.7)"
    title: "Confidence kohesi CSD"
    chapter: "2"
    expression_source: "conf_e = sum(RSI_es)/|S| (klastering aglomeratif, seed 0.5, cutoff 0.75)"
    variables:
      - { symbol: "RSI_es", meaning: "RSI kandidat e terhadap anggota s", unit: "none" }
      - { symbol: "|S|", meaning: "jumlah anggota grup", unit: "none" }
    first_mentioned_in: "BAB II 2.2.7 (#eq-doubt)"
    status: "inserted"
    risk_notes: "Sudah diselaraskan dengan implementasi simetris"
  - id: "(2.8)"
    title: "Weighted Risk Scoring total"
    chapter: "2"
    expression_source: "R_total = sum(Weight(Event_i)) (SuspicionService.cs:54)"
    variables:
      - { symbol: "Weight(Event_i)", meaning: "bobot penalti anomali ke-i", unit: "none" }
    first_mentioned_in: "BAB II 2.2.8 (#eq-rtotal)"
    status: "inserted"
    risk_notes: "Skor mentah kumulatif, tanpa normalisasi"

screenshot_checklist:
  required:
    - "Resolusi cukup, tetap jelas saat dimasukkan ke Word"
    - "Potong bilah alamat/desktop/notifikasi yang tidak relevan"
    - "Data pada tangkapan layar konsisten dengan teks"
    - "Nama akun, IP nyata, token sudah disamarkan bila perlu"
    - "Nama berkas tangkapan layar sesuai nomor gambar"
