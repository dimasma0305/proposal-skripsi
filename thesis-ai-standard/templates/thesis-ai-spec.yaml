  advisor: "Dosen Pembimbing I & II (nama belum diisi)"
  submission_date: "2026"

project:
  name: "Sistem Deteksi Kecurangan GZCTF (Anti-Cheat Middleware)"
  domain: "Keamanan siber / integritas kompetisi Capture The Flag (CTF)"
  problem_statement: "GZCTF hanya menyediakan pemantauan log reaktif sehingga deteksi kecurangan (flag sharing, kolusi) bergantung pada pemeriksaan manual yang tidak efisien dan rentan human error."
  objectives:
    - "Membangun modul deteksi kecurangan modular berbasis middleware ASP.NET Core pada GZCTF"
    - "Mengimplementasikan Sequence Similarity Analysis (LCS + Jaccard) dengan validasi CSD"
    - "Mengembangkan Weighted Risk Scoring untuk melabeli tingkat kecurigaan tim"
    - "Mengevaluasi performa sistem dengan presisi, recall, dan F1-score"
  scope:
    included:
      - "Analisis Jaringan (Cross-Team IP, Token Abuse, Shared IP, Shared Fingerprint, Unknown IP)"
      - "Analisis Perilaku (Fast Solve, Burst, Hoarding, No Download/Container)"
      - "Deteksi Kolusi (RSI = LCS+Jaccard, CSD, SequenceSimilarity, CollusionGroup)"
      - "Weighted Risk Scoring dan dashboard admin"
    excluded:
      - "Sinyal tambahan di luar lingkup proposal (honeypot, container-access) tidak didokumentasikan"
      - "Deteksi berbasis machine learning (masuk saran/future work)"

implementation_sources:
  code_repository: "/root/homelab/GZCTF (branch develop)"
  database_schema: "/root/homelab/GZCTF/src/GZCTF/Migrations (AddSuspicionSystem, OptimizeSuspicionModel, dst.)"
  api_docs: "/root/homelab/GZCTF/src/GZCTF/Controllers/CheatReportController.cs (GET /api/game/{id}/cheatreport, /compare)"
