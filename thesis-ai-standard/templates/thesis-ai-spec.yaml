    description: "Meninjau laporan kecurangan, menelaah skor risiko tim, memvalidasi/memblokir peserta"
    evidence: "CheatReportController [RequireMonitor]; AdminController AntiCheatBlocks"
  - name: "Peserta (Tim)"
    description: "Mengirim flag; aktivitasnya direkam dan dianalisis sistem"
    evidence: "GameInstanceRepository.VerifyAnswer; AccountController login logging"

technology_stack:
  frontend: ["React (ClientApp GZCTF)"]
  backend: ["C# .NET 8.0", "ASP.NET Core middleware/pipeline"]
  database: ["PostgreSQL 15", "Redis (cache)"]
  tools: ["Docker", "Git", "JMeter (rencana uji performa)"]
  external_services: []
  notes: "Konsisten dengan ekosistem GZCTF; bukti di paper-context/evidence/tech-stack.md"

functional_modules:
  - name: "Middleware Interceptor (Stage 1)"
    description: "Merekam IP, Browser Fingerprint, timestamp, dan metadata interaksi secara sinkron"
    evidence: ["AccountController.cs", "ContainerAccessLogger.cs", "GameEvent logging"]
  - name: "Asynchronous Analysis Engine (Stage 2)"
    description: "Stolen flag, analisis IP/jaringan, analisis perilaku, dan deteksi kolusi (LCS/Jaccard/RSI/CSD)"
    evidence: ["CheatReportController.cs", "GameInstanceRepository.cs (StolenFlag)"]
  - name: "Weighted Risk Scoring"
    description: "Akumulasi bobot anomali per tim (idempoten) ke entitas Participation"
    evidence: ["SuspicionService.cs", "SuspicionType.cs (Defaults weight table)"]
  - name: "Admin Risk Dashboard"
    description: "Daftar tim terurut skor, ring gauge, rincian suspicion event, collusion compare"
    evidence: ["ClientApp/src/components/monitor/CheatInfo.tsx", "pages/.../CheatCheck.tsx"]

database_design:
  evidence_status: "partial"
  source_files:
    - "/root/homelab/GZCTF/src/GZCTF/Models/Data/SuspicionEvent.cs"
    - "/root/homelab/GZCTF/src/GZCTF/Models/Data/SuspicionRule.cs"
    - "/root/homelab/GZCTF/src/GZCTF/Models/Data/Participation.cs"
    - "/root/homelab/GZCTF/src/GZCTF/Migrations (AddSuspicionSystem, OptimizeSuspicionModel)"
  entities:
    - name: "SuspicionEvent"
      table: "SuspicionEvents"
      purpose: "Log satu peristiwa anomali (jenis, bobot, waktu, detail) per partisipasi"
      evidence: "Models/Data/SuspicionEvent.cs"
      fields:
        - { name: "Id", type: "int", key: true, nullable: "false", description: "Primary key", evidence: "SuspicionEvent.cs" }
        - { name: "ParticipationId", type: "int", key: false, nullable: "false", description: "FK ke Participation", evidence: "SuspicionEvent.cs" }
        - { name: "Type", type: "string", key: false, nullable: "false", description: "Kode aturan (StolenFlag, dst.)", evidence: "SuspicionEvent.cs" }
        - { name: "ScoreDelta", type: "int", key: false, nullable: "false", description: "Bobot yang ditambahkan", evidence: "SuspicionEvent.cs" }
        - { name: "Details", type: "string", key: false, nullable: "false", description: "Deskripsi bukti", evidence: "SuspicionEvent.cs" }
        - { name: "TimeUtc", type: "DateTimeOffset", key: false, nullable: "false", description: "Waktu kejadian", evidence: "SuspicionEvent.cs" }
        - { name: "GameId", type: "int", key: false, nullable: "false", description: "FK ke Game", evidence: "SuspicionEvent.cs" }
        - { name: "RelatedParticipationId", type: "int", key: false, nullable: "true", description: "Partisipasi terkait (opsional)", evidence: "SuspicionEvent.cs" }
    - name: "SuspicionRule"
      table: "SuspicionRules"
      purpose: "Definisi aturan deteksi dan bobot penalti (dapat dikonfigurasi)"
      evidence: "Models/Data/SuspicionRule.cs; SuspicionType.Defaults"
      fields:
        - { name: "RuleCode", type: "string", key: true, nullable: "false", description: "Kode aturan unik", evidence: "SuspicionRule.cs" }
        - { name: "Weight", type: "int", key: false, nullable: "false", description: "Bobot risiko", evidence: "SuspicionRule.cs" }
        - { name: "Description", type: "string", key: false, nullable: "false", description: "Keterangan aturan", evidence: "SuspicionRule.cs" }
    - name: "Participation"
      table: "Participations"
      purpose: "Partisipasi tim pada suatu game; menyimpan skor kecurigaan kumulatif"
      evidence: "Models/Data/Participation.cs:98 (SuspicionScore)"
      fields:
        - { name: "Id", type: "int", key: true, nullable: "false", description: "Primary key", evidence: "Participation.cs" }
        - { name: "SuspicionScore", type: "int", key: false, nullable: "false", description: "Akumulasi skor risiko (mentah, tak ternormalisasi)", evidence: "Participation.cs:98" }
        - { name: "Status", type: "ParticipationStatus", key: false, nullable: "false", description: "Status kepesertaan", evidence: "Participation.cs" }
  relationships:
    - { name: "Participation memiliki banyak SuspicionEvent", from: "Participation", to: "SuspicionEvent", fromCardinality: "1", toCardinality: "m", evidence: "SuspicionEvent.ParticipationId" }
    - { name: "SuspicionEvent merujuk SuspicionRule via kode", from: "SuspicionEvent", to: "SuspicionRule", fromCardinality: "m", toCardinality: "1", evidence: "SuspicionEvent.Type == SuspicionRule.RuleCode" }

