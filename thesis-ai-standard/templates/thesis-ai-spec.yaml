paper:
  title: "Perancangan Sistem Pendeteksi Kecurangan pada Platform GZCTF Menggunakan Algoritma Two-Stage Similarity Analysis dan Weighted Risk Scoring"
  type: "Skripsi (Sarjana Terapan)"
  type_profile: "system_design"
